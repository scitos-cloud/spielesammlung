{% extends "base.html" %}
{% block title %} - Registrieren{% endblock %}
{% block content %}
<div class="auth-form">
    <h2>Registrieren</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Benutzername" required autofocus>
        <input type="password" name="password" placeholder="Passwort" required>
        <button type="submit">Registrieren</button>
    </form>
    <p>Bereits registriert? <a href="{{ url_for('auth.login') }}">Anmelden</a></p>
</div>
{% endblock %}
